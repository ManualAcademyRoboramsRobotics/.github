name: Bug
description: Track bugs and defects related to the project.
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide a clear and concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low (Annoyance)
        - Medium (Minor functionality broken)
        - High (Core feature/functionality broken)
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Size
      options:
        - Small (5 - 30 mins)
        - Medium (30 - 60 mins)
        - Large (60+ mins)
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. When I do '...'
        2. The robot does '...'
        3. The expected behavior is '...'
    validations:
      required: false
  - type: markdown
    id: instructions
    attributes:
      label: Instructions/Tasklist
      value: |
        ---
        💡 **Tip:** To link sub-tasks to this issue, use a tasklist block:
        ```
        ```tasklist
        - [ ] organization-name/repo#issue_number
        ```
        ```
    validations:
      required: false
  