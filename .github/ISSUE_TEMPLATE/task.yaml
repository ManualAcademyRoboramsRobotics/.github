name: Task
description: Track tasks related to the project. They may be standalone or related to a feature or bug.
title: "[TASK]: "
labels: ["task", "triage"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low (Minor task, not urgent)
        - Medium (Important but not urgent)
        - High (Critically important and urgent)
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Size
      options:
        - Small (5 - 30 mins)
        - Medium (30 - 60 mins)
        - Large (60+ mins)
    validations:
      required: true
  - type: dropdown
    id: targetCompletion
    attributes:
      label: Target Completion Date
      options:
        - No target
        - Meet 1
        - Meet 2
        - Meet 3
        - Qualifier
        - State
        - Worlds
        - Premere Event
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide a clear and concise description of the task.
    validations:
      required: true